name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v2.0.0)'
        required: true
        default: 'v2.0.0'

jobs:
  # ============================================
  # BUILD FOR WINDOWS
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Python backend
        working-directory: migration_python
        run: |
          python -m venv venv
          .\venv\Scripts\activate
          pip install -r requirements.txt

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name || github.event.inputs.version }}
          releaseName: 'DeX Trading Agent ${{ github.ref_name || github.event.inputs.version }}'
          releaseBody: |
            ## DeX Trading Agent Desktop Release
            
            ### What's New
            - Tauri v2 desktop application
            - Secure API key storage
            - Native wallet integration
            - TradingView charts support
            - 48 API endpoints for trading
            
            ### Installation
            1. Download the installer for your platform
            2. Run the installer
            3. Launch DeX Trading Agent
            
            ### System Requirements
            - Windows 10/11 (x64)
            - macOS 10.15+ (Intel/Apple Silicon)
            - Ubuntu 20.04+ / Debian 11+ (x64)
            
            ### Documentation
            - [README](./README.md)
            - [Migration Guide](./MIGRATION.md)
            - [Build Instructions](./BUILD.md)
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  # ============================================
  # BUILD FOR MACOS (Intel)
  # ============================================
  build-macos-intel:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Python backend
        working-directory: migration_python
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name || github.event.inputs.version }}
          releaseName: 'DeX Trading Agent ${{ github.ref_name || github.event.inputs.version }}'
          releaseBody: |
            ## DeX Trading Agent Desktop Release
            
            ### What's New
            - Tauri v2 desktop application
            - Secure API key storage
            - Native wallet integration
            - TradingView charts support
            - 48 API endpoints for trading
            
            ### Installation
            1. Download the .dmg for your platform
            2. Open the .dmg and drag to Applications
            3. Launch DeX Trading Agent from Applications
            
            ### System Requirements
            - macOS 10.15+ (Intel)
            - 4GB RAM minimum
            - Internet connection for trading data
            
            ### Documentation
            - [README](./README.md)
            - [Migration Guide](./MIGRATION.md)
            - [Build Instructions](./BUILD.md)
          releaseDraft: true
          prerelease: false
          args: --target x86_64-apple-darwin

  # ============================================
  # BUILD FOR MACOS (Apple Silicon)
  # ============================================
  build-macos-arm:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: aarch64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Python backend
        working-directory: migration_python
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name || github.event.inputs.version }}-arm64
          releaseName: 'DeX Trading Agent ${{ github.ref_name || github.event.inputs.version }} (Apple Silicon)'
          releaseBody: |
            ## DeX Trading Agent for Apple Silicon (M1/M2/M3)
            
            ### What's New
            - Native Apple Silicon support
            - Optimized for M1/M2/M3 chips
            - All features from main release
            
            ### Installation
            1. Download the .dmg file
            2. Open and drag to Applications
            3. Launch from Applications folder
            
            ### Requirements
            - macOS 11.0+ (Big Sur or later)
            - Apple Silicon Mac (M1/M2/M3)
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin

  # ============================================
  # BUILD FOR LINUX
  # ============================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Python backend
        working-directory: migration_python
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name || github.event.inputs.version }}
          releaseName: 'DeX Trading Agent ${{ github.ref_name || github.event.inputs.version }}'
          releaseBody: |
            ## DeX Trading Agent Desktop Release
            
            ### What's New
            - Tauri v2 desktop application
            - Secure API key storage
            - Native wallet integration
            - TradingView charts support
            - 48 API endpoints for trading
            
            ### Installation
            **AppImage (Recommended):**
            1. Download the .AppImage file
            2. Make it executable: `chmod +x DeX-Trading-Agent-*.AppImage`
            3. Run: `./DeX-Trading-Agent-*.AppImage`
            
            **DEB Package:**
            1. Download the .deb file
            2. Install: `sudo dpkg -i dex-trading-agent_*.deb`
            3. Fix dependencies: `sudo apt-get install -f`
            
            ### System Requirements
            - Ubuntu 20.04+ / Debian 11+ / Fedora 35+
            - x86_64 architecture
            - 4GB RAM minimum
            
            ### Documentation
            - [README](./README.md)
            - [Migration Guide](./MIGRATION.md)
            - [Build Instructions](./BUILD.md)
          releaseDraft: true
          prerelease: false

  # ============================================
  # CREATE FINAL RELEASE
  # ============================================
  create-release:
    needs: [build-windows, build-macos-intel, build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Changelog
        id: changelog
        run: |
          echo "## Changes in ${{ github.ref_name || github.event.inputs.version }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --oneline --no-decorate $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md || echo "No previous tag"
          cat CHANGELOG.md

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          release_name: Release ${{ github.ref_name || github.event.inputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

  # ============================================
  # NOTIFY DISCORD
  # ============================================
  notify:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Discord Notification
        uses: Ilshidur/action-discord@master
        if: ${{ secrets.DISCORD_WEBHOOK != '' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 **DeX Trading Agent ${{ github.ref_name || github.event.inputs.version }} Released!**
            
            Download now: https://github.com/VenTheZone/dex-trading-agent/releases/tag/${{ github.ref_name || github.event.inputs.version }}
            
            **What's New:**
            • Tauri v2 Desktop Application
            • Secure API Key Storage
            • Native Wallet Integration
            • TradingView Charts Support
            • 48 Trading API Endpoints
            
            Available for Windows, macOS (Intel/Apple Silicon), and Linux!
